<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 OpenClaw 语音交互</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .status-bar {
            background: #f5f5f5;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }
        .status { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #999;
        }
        .status-dot.online {
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 30px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5em; flex-shrink: 0;
        }
        .message.agent .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message.user .avatar { background: #e0e0e0; }
        .bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
        }
        .message.agent .bubble {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bubble-text { margin-bottom: 10px; line-height: 1.5; }
        .controls {
            padding: 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .scene-selector {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .scene-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .scene-btn:hover { border-color: #667eea; }
        .scene-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .record-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .record-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .record-btn.recording {
            background: #ef4444;
            animation: pulse 0.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 OpenClaw 语音交互</h1>
            <p>说话即可与 AI 对话，支持 6 种语音风格</p>
        </div>
        <div class="status-bar">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">连接中...</span>
            </div>
            <div>🎭 场景：<strong id="currentScene">通用</strong></div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="message agent">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="bubble-text">你好！我是 OpenClaw 智能助手，点击下面的按钮开始语音对话吧！</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="scene-selector">
                <button class="scene-btn active" data-scene="default">🎵 通用</button>
                <button class="scene-btn" data-scene="gentle">🌸 温柔</button>
                <button class="scene-btn" data-scene="cute">🎀 可爱</button>
                <button class="scene-btn" data-scene="professional">💼 专业</button>
                <button class="scene-btn" data-scene="promotion">🔥 促销</button>
                <button class="scene-btn" data-scene="weak">🌙 柔弱</button>
            </div>
            <!-- 文字输入框 -->
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="text" id="textInput" placeholder="输入文字，按回车发送..." 
                       style="flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 16px; outline: none;"
                       onkeypress="if(event.key==='Enter') sendText()">
                <button onclick="sendText()" 
                        style="padding: 15px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 15px; font-size: 16px; cursor: pointer; font-weight: 600;">
                    发送
                </button>
            </div>
            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                <span>🎤</span>
                <span id="recordText">按住说话（需 HTTPS）</span>
            </button>
            <p style="text-align: center; margin-top: 10px; color: #999; font-size: 14px;">
                ⚠️ 公网访问请使用文字输入，或配置 HTTPS 后使用语音
            </p>
        </div>
    </div>
    <script>
        const API_BASE = '/api';  // 使用同端口代理，避免跨域
        let selectedScene = 'default';
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];

        async function init() {
            await checkStatus();
            setupSceneButtons();
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                document.getElementById('statusDot').classList.add('online');
                document.getElementById('statusText').textContent = '服务正常';
            } catch (error) {
                document.getElementById('statusText').textContent = '服务未连接';
            }
        }

        function setupSceneButtons() {
            const buttons = document.querySelectorAll('.scene-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedScene = btn.dataset.scene;
                    document.getElementById('currentScene').textContent = btn.textContent.split(' ')[1];
                });
            });
        }

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processAudio(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                const btn = document.getElementById('recordBtn');
                btn.classList.add('recording');
                document.getElementById('recordText').textContent = '松开结束';
            } catch (error) {
                alert('无法访问麦克风：' + error.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            isRecording = false;
            const btn = document.getElementById('recordBtn');
            btn.classList.remove('recording');
            document.getElementById('recordText').textContent = '按住说话';
        }

        async function processAudio(audioBlob) {
            addMessage('user', '🗣️ 语音消息已发送');
            try {
                const formData = new FormData();
                formData.append('audio', audioBlob);
                // 演示模式：显示提示
                addMessage('agent', '🤖 演示模式：语音识别服务未配置，实际使用时会调用 OpenClaw API 处理语音并返回 TTS 音频。');
            } catch (error) {
                addMessage('agent', '❌ 错误：' + error.message);
            }
        }

        // 文字输入发送
        async function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage('user', '📝 ' + text);
            input.value = '';
            
            try {
                // 调用 TTS API 生成语音
                const response = await fetch(`${API_BASE}/speak`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, scene: selectedScene })
                });
                const data = await response.json();
                
                if (data.success) {
                    // 播放生成的语音
                    const audio = new Audio(`${API_BASE}/audio/${data.filename}`);
                    audio.play();
                    addMessage('agent', '🔊 ' + text + ' <br><small>（语音已播放）</small>');
                } else {
                    addMessage('agent', '❌ 生成失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                addMessage('agent', '❌ 错误：' + error.message);
            }
        }

        function addMessage(role, text) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="avatar">${role === 'agent' ? '🤖' : '👤'}</div>
                <div class="bubble">
                    <div class="bubble-text">${text}</div>
                </div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
