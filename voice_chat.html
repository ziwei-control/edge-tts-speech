<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 OpenClaw 语音交互 - 支持 152 个音色</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .status-bar {
            background: #f5f5f5;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }
        .status { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #999;
        }
        .status-dot.online {
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .chat-area {
            height: 350px;
            overflow-y: auto;
            padding: 30px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5em; flex-shrink: 0;
        }
        .message.agent .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message.user .avatar { background: #e0e0e0; }
        .bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
        }
        .message.agent .bubble {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bubble-text { margin-bottom: 10px; line-height: 1.5; }
        .audio-player {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        audio { width: 100%; height: 35px; }
        .controls {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        /* 语音选择器 */
        .voice-selector-container {
            margin-bottom: 15px;
        }
        .voice-selector-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .voice-selector-header h3 {
            font-size: 0.95em;
            color: #666;
        }
        .voice-link {
            font-size: 0.85em;
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        .voice-link:hover { text-decoration: underline; }
        .voice-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }
        .voice-option {
            padding: 6px 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .voice-option:hover {
            border-color: #667eea;
            background: #f0f0ff;
            transform: translateY(-2px);
        }
        .voice-option.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .scene-selector {
            display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;
        }
        .scene-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .scene-btn:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        .scene-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        .input-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-field {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #667eea;
        }
        .send-btn, .voice-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .voice-btn {
            background: #f0f0f0;
            color: #333;
        }
        .voice-btn:hover {
            background: #e0e0e0;
        }
        .voice-btn.recording {
            background: #ef4444;
            color: white;
            animation: pulse 1s infinite;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            max-width: 100px;
        }
        .typing-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.9em;
            margin-top: 10px;
            text-align: center;
        }
        .voice-info {
            font-size: 0.8em;
            color: #999;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 OpenClaw 语音交互</h1>
            <p>支持 152 个音色 · 实时语音对话</p>
        </div>
        
        <div class="status-bar">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">连接中...</span>
            </div>
            <div style="font-size: 0.9em; color: #666;">
                 <span id="currentTime"></span>
            </div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message agent">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="bubble-text">你好！我是你的语音助手～<br>支持 152 个音色可选哦！<br><br>🎵 你可以：<br>• 输入文字，我转语音回复<br>• 按住说话，语音对话<br>• 点击上方音色切换声音</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <!-- 语音选择器 -->
            <div class="voice-selector-container">
                <div class="voice-selector-header">
                    <h3>🎵 选择音色（<span id="currentVoiceName">xiaoxiao</span>）</h3>
                    <span class="voice-link" onclick="toggleVoiceSelector()">展开全部 152 个音色 ▼</span>
                </div>
                <div class="voice-selector" id="voiceSelector">
                    <!-- 动态加载 -->
                </div>
                <div class="voice-info">已加载 <span id="voiceCount">0</span> 个音色 · 点击切换</div>
            </div>
            
            <!-- 场景选择 -->
            <div class="scene-selector" id="sceneSelector">
                <button class="scene-btn active" data-scene="default">🎵 通用</button>
                <button class="scene-btn" data-scene="gentle">🌸 温柔</button>
                <button class="scene-btn" data-scene="cute">🎀 可爱</button>
                <button class="scene-btn" data-scene="professional">💼 专业</button>
                <button class="scene-btn" data-scene="promotion">🔥 促销</button>
                <button class="scene-btn" data-scene="weak">🌙 柔弱</button>
            </div>
            
            <!-- 输入区域 -->
            <div class="input-area">
                <input 
                    type="text" 
                    class="input-field" 
                    id="textInput" 
                    placeholder="输入文字，按回车发送..."
                    onkeypress="if(event.key==='Enter') sendText()"
                >
                <button class="voice-btn" id="voiceBtn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">
                    🎤 按住说话
                </button>
                <button class="send-btn" onclick="sendText()">发送</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentScene = 'default';
        let currentVoice = 'xiaoxiao'; // 默认语音
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let voiceData = {};
        let voiceSelectorExpanded = false;

        // 场景配置
        const sceneConfig = {
            default: { emoji: '🎵', name: '通用', rate: -5 },
            gentle: { emoji: '🌸', name: '温柔', rate: -10 },
            cute: { emoji: '🎀', name: '可爱', rate: -10 },
            professional: { emoji: '💼', name: '专业', rate: 0 },
            promotion: { emoji: '🔥', name: '促销', rate: 0 },
            weak: { emoji: '🌙', name: '柔弱', rate: -20 }
        };

        // 加载语音数据
        async function loadVoiceData() {
            try {
                const response = await fetch('voice_data.json');
                voiceData = await response.json();
                
                // 提取所有唯一的语音名
                const allVoices = new Set();
                Object.values(voiceData).forEach(voices => {
                    voices.forEach(v => allVoices.add(v.voiceName));
                });
                
                const voiceList = Array.from(allVoices).sort();
                renderVoiceSelector(voiceList);
                document.getElementById('voiceCount').textContent = voiceList.length;
            } catch (error) {
                console.error('加载语音数据失败:', error);
                // 使用默认语音列表
                const defaultVoices = ['xiaoxiao', 'xiaoyi', 'xiaoxuan', 'xiaomo', 'yunhao', 'yunye'];
                renderVoiceSelector(defaultVoices);
                document.getElementById('voiceCount').textContent = defaultVoices.length;
            }
        }

        // 渲染语音选择器
        function renderVoiceSelector(voices) {
            const container = document.getElementById('voiceSelector');
            container.innerHTML = '';
            
            voices.forEach(voice => {
                const option = document.createElement('div');
                option.className = 'voice-option' + (voice === currentVoice ? ' active' : '');
                option.textContent = voice;
                option.onclick = () => selectVoice(voice);
                container.appendChild(option);
            });
        }

        // 切换语音选择器显示
        function toggleVoiceSelector() {
            voiceSelectorExpanded = !voiceSelectorExpanded;
            const container = document.getElementById('voiceSelector');
            const link = document.querySelector('.voice-link');
            
            if (voiceSelectorExpanded) {
                // 显示所有语音
                const allVoices = new Set();
                Object.values(voiceData).forEach(voices => {
                    voices.forEach(v => allVoices.add(v.voiceName));
                });
                renderVoiceSelector(Array.from(allVoices).sort());
                container.style.maxHeight = '300px';
                link.textContent = '收起 ▲';
            } else {
                // 只显示常用语音
                const commonVoices = ['xiaoxiao', 'xiaoyi', 'xiaoxuan', 'xiaomo', 'yunhao', 'yunye'];
                renderVoiceSelector(commonVoices);
                container.style.maxHeight = '150px';
                link.textContent = '展开全部 152 个音色 ▼';
            }
        }

        // 选择语音
        function selectVoice(voice) {
            currentVoice = voice;
            document.getElementById('currentVoiceName').textContent = voice;
            
            // 更新选中状态
            document.querySelectorAll('.voice-option').forEach(opt => {
                opt.classList.toggle('active', opt.textContent === voice);
            });
            
            // 添加提示
            addAgentMessage(`已切换到 ${voice} 音色 ✨`);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadVoiceData();
            updateStatus();
            updateTime();
            setInterval(updateTime, 1000);
            
            // 场景选择
            document.querySelectorAll('.scene-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentScene = this.dataset.scene;
                });
            });
        });

        function updateStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            dot.classList.add('online');
            text.textContent = '在线';
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, isUser = false) {
            const chatArea = document.getElementById('chatArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'agent'}`;
            msgDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="bubble">
                    <div class="bubble-text">${text}</div>
                </div>
            `;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return msgDiv;
        }

        function addAgentMessage(text) {
            return addMessage(text, false);
        }

        function showTyping() {
            const chatArea = document.getElementById('chatArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message agent';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';

            showTyping();
            try {
                const response = await fetch(`${API_BASE}/speak`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        scene: currentScene,
                        voice: currentVoice
                    })
                });

                const data = await response.json();
                removeTyping();

                if (data.success) {
                    const msgDiv = addAgentMessage(data.text || '语音已生成');
                    const audioDiv = document.createElement('div');
                    audioDiv.className = 'audio-player';
                    audioDiv.innerHTML = `<audio controls autoplay src="${data.url}"></audio>`;
                    msgDiv.querySelector('.bubble').appendChild(audioDiv);
                } else {
                    addAgentMessage('❌ ' + (data.error || '生成失败'));
                }
            } catch (error) {
                removeTyping();
                addAgentMessage('❌ 请求失败：' + error.message);
            }
        }

        async function startRecording() {
            const btn = document.getElementById('voiceBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = sendAudio;

                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
                btn.textContent = '🔴 录音中...';
                errorMsg.textContent = '';
            } catch (error) {
                errorMsg.textContent = '⚠️ 麦克风权限被拒绝。请使用文字输入，或确保使用 HTTPS 访问。';
                console.error('录音失败:', error);
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            const btn = document.getElementById('voiceBtn');
            btn.classList.remove('recording');
            btn.textContent = '🎤 按住说话';
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }

        async function sendAudio() {
            if (audioChunks.length === 0) return;

            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');

            showTyping();
            try {
                // 先转文字
                const transcribeResponse = await fetch(`${API_BASE}/transcribe`, {
                    method: 'POST',
                    body: formData
                });
                const transcribeData = await transcribeResponse.json();

                if (transcribeData.success) {
                    addMessage(`[语音] ${transcribeData.text}`, true);
                    
                    // 再 TTS 回复
                    const speakResponse = await fetch(`${API_BASE}/speak`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: transcribeData.text,
                            scene: currentScene,
                            voice: currentVoice
                        })
                    });
                    const speakData = await speakResponse.json();
                    removeTyping();

                    if (speakData.success) {
                        const msgDiv = addAgentMessage(speakData.text || '语音回复');
                        const audioDiv = document.createElement('div');
                        audioDiv.className = 'audio-player';
                        audioDiv.innerHTML = `<audio controls autoplay src="${speakData.url}"></audio>`;
                        msgDiv.querySelector('.bubble').appendChild(audioDiv);
                    }
                } else {
                    removeTyping();
                    addAgentMessage('❌ 识别失败：' + (transcribeData.error || '未知错误'));
                }
            } catch (error) {
                removeTyping();
                addAgentMessage('❌ 请求失败：' + error.message);
            }
        }
    </script>
</body>
</html>
