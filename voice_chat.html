<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 OpenClaw 语音交互</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .status-bar {
            background: #f5f5f5;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }
        .status { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #999;
        }
        .status-dot.online {
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 30px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5em; flex-shrink: 0;
        }
        .message.agent .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message.user .avatar { background: #e0e0e0; }
        .bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
        }
        .message.agent .bubble {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bubble-text { margin-bottom: 10px; line-height: 1.5; }
        .controls {
            padding: 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .scene-selector {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .scene-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .scene-btn:hover { border-color: #667eea; }
        .scene-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .record-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .record-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .record-btn.recording {
            background: #ef4444;
            animation: pulse 0.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 OpenClaw 语音交互</h1>
            <p>说话即可与 AI 对话，支持 6 种语音风格</p>
        </div>
        <div class="status-bar">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">连接中...</span>
            </div>
            <div>🎭 场景：<strong id="currentScene">通用</strong></div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="message agent">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="bubble-text">你好！我是 OpenClaw 智能助手，点击下面的按钮开始语音对话吧！</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="scene-selector">
                <button class="scene-btn active" data-scene="default">🎵 通用</button>
                <button class="scene-btn" data-scene="gentle">🌸 温柔</button>
                <button class="scene-btn" data-scene="cute">🎀 可爱</button>
                <button class="scene-btn" data-scene="professional">💼 专业</button>
                <button class="scene-btn" data-scene="promotion">🔥 促销</button>
                <button class="scene-btn" data-scene="weak">🌙 柔弱</button>
            </div>
            <!-- 文字输入框 -->
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="text" id="textInput" placeholder="输入文字，按回车发送..." 
                       style="flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 16px; outline: none;"
                       onkeypress="if(event.key==='Enter') sendText()">
                <button onclick="sendText()" 
                        style="padding: 15px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 15px; font-size: 16px; cursor: pointer; font-weight: 600;">
                    发送
                </button>
            </div>
            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                <span>🎤</span>
                <span id="recordText">按住说话</span>
            </button>
            <!-- HTTPS 提示 -->
            <div id="httpsNotice" style="display: none; margin-top: 15px; padding: 15px; background: #fff3cd; border: 2px solid #ffc107; border-radius: 10px;">
                <strong>⚠️ 当前为 HTTP 连接</strong><br>
                <span style="font-size: 14px; color: #666;">
                    浏览器限制：HTTP 无法使用麦克风<br>
                    <a href="#" onclick="showHttpsGuide(); return false;" style="color: #007bff; text-decoration: underline;">
                        👉 点击这里，1 分钟配置 HTTPS（免费）
                    </a>
                </span>
            </div>
            <p style="text-align: center; margin-top: 10px; color: #999; font-size: 14px;">
                💡 也可以使用文字输入，无需 HTTPS
            </p>
        </div>
    </div>
    <script>
        const API_BASE = '/api';  // 使用同端口代理，避免跨域
        let selectedScene = 'default';
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];

        async function init() {
            await checkStatus();
            setupSceneButtons();
            checkHTTPS();  // 检测是否需要 HTTPS 提示
        }

        // 检测 HTTP/HTTPS
        function checkHTTPS() {
            const isHTTPS = window.location.protocol === 'https:' || window.location.hostname === 'localhost';
            if (!isHTTPS) {
                document.getElementById('httpsNotice').style.display = 'block';
                document.getElementById('recordText').textContent = '按住说话（需 HTTPS）';
            }
        }

        // 显示 HTTPS 配置指南
        function showHttpsGuide() {
            const guide = `
🔒 1 分钟配置 HTTPS（免费）

方法 1：Cloudflare Tunnel（推荐）
1. 在服务器终端执行：
   bash /home/admin/projects/live-tts/setup_https.sh

2. 等待获取 HTTPS 链接

3. 访问链接即可使用语音输入！

方法 2：SSH 隧道（无需配置）
1. 本地电脑执行：
   ssh -L 7091:localhost:7091 root@8.213.149.224

2. 访问：http://localhost:7091/voice_chat.html

3. localhost 可以使用麦克风！

方法 3：文字输入（无需 HTTPS）
直接使用下方的文字输入框，
输入文字 → 按回车 → 听语音
            `;
            alert(guide);
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                document.getElementById('statusDot').classList.add('online');
                document.getElementById('statusText').textContent = '服务正常';
            } catch (error) {
                document.getElementById('statusText').textContent = '服务未连接';
            }
        }

        function setupSceneButtons() {
            const buttons = document.querySelectorAll('.scene-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedScene = btn.dataset.scene;
                    document.getElementById('currentScene').textContent = btn.textContent.split(' ')[1];
                });
            });
        }

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            // 检查是否 HTTPS
            const isHTTPS = window.location.protocol === 'https:' || window.location.hostname === 'localhost';
            if (!isHTTPS) {
                alert('⚠️ 浏览器安全限制\n\nHTTP 连接无法使用麦克风，请选择：\n\n1️⃣ 配置 HTTPS（推荐）\n   执行：bash /home/admin/projects/live-tts/setup_https.sh\n\n2️⃣ 使用 SSH 隧道\n   ssh -L 7091:localhost:7091 root@8.213.149.224\n\n3️⃣ 使用文字输入（无需 HTTPS）\n   直接使用下方输入框');
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processAudio(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                const btn = document.getElementById('recordBtn');
                btn.classList.add('recording');
                document.getElementById('recordText').textContent = '松开结束';
            } catch (error) {
                if (error.name === 'NotAllowedError') {
                    alert('❌ 麦克风权限被拒绝\n\n请在浏览器地址栏点击锁图标，允许麦克风权限');
                } else if (error.name === 'NotFoundError') {
                    alert('❌ 未找到麦克风设备\n\n请检查麦克风是否连接正常');
                } else {
                    alert('❌ 无法访问麦克风：' + error.message);
                }
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            isRecording = false;
            const btn = document.getElementById('recordBtn');
            btn.classList.remove('recording');
            document.getElementById('recordText').textContent = '按住说话';
        }

        async function processAudio(audioBlob) {
            addMessage('user', '🗣️ 语音消息已发送');
            try {
                // 步骤 1：语音识别（STT）- 将语音转为文字
                const sttFormData = new FormData();
                sttFormData.append('audio', audioBlob);
                
                const sttResponse = await fetch(`${API_BASE}/transcribe`, {
                    method: 'POST',
                    body: sttFormData
                });
                const sttData = await sttResponse.json();
                
                if (!sttData.success) {
                    throw new Error(sttData.error || '语音识别失败');
                }
                
                const recognizedText = sttData.text;
                addMessage('user', `📝 "${recognizedText}"`);
                
                // 步骤 2：调用 TTS API 生成语音回复
                const response = await fetch(`${API_BASE}/speak`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: recognizedText, scene: selectedScene })
                });
                const data = await response.json();
                
                if (data.success) {
                    // 播放生成的语音
                    const audio = new Audio(`${API_BASE}/audio/${data.filename}`);
                    audio.play();
                    addMessage('agent', `🔊 ${recognizedText} <br><small>（语音已播放）</small>`);
                } else {
                    addMessage('agent', '❌ 生成失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                addMessage('agent', '❌ 错误：' + error.message);
            }
        }

        // 文字输入发送
        async function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage('user', '📝 ' + text);
            input.value = '';
            
            try {
                // 调用 TTS API 生成语音
                const response = await fetch(`${API_BASE}/speak`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, scene: selectedScene })
                });
                const data = await response.json();
                
                if (data.success) {
                    // 播放生成的语音
                    const audio = new Audio(`${API_BASE}/audio/${data.filename}`);
                    audio.play();
                    addMessage('agent', '🔊 ' + text + ' <br><small>（语音已播放）</small>');
                } else {
                    addMessage('agent', '❌ 生成失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                addMessage('agent', '❌ 错误：' + error.message);
            }
        }

        function addMessage(role, text) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="avatar">${role === 'agent' ? '🤖' : '👤'}</div>
                <div class="bubble">
                    <div class="bubble-text">${text}</div>
                </div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
